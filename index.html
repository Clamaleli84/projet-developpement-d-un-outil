<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard Monitoring</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #ececec; margin: 20px; }
        .machine-block { background: #fff; border-radius: 10px; padding: 20px; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .grid { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }
        .card { background: #f9f9f9; border: 1px solid #ddd; padding: 10px; border-radius: 5px; }
        h2 { border-bottom: 2px solid #3498db; padding-bottom: 10px; color: #3498db; }
        img { width: 400px; height: auto; display: block; }
    </style>
</head>
<body>
    <h1>📊 Monitoring en Temps Réel</h1>

    {% for machine in machines %}
    <div class="machine-block">
        <h2>Machine : {{ machine }}</h2>
        <div class="grid">
            {% for m in metriques %}
            <div class="card">
                <h3>{{ m | upper }}</h3>
                <img src="{{ url_for('static', filename=m + '_' + machine + '.png') }}" alt="Graphique {{ m }}">
            </div>
            {% endfor %}
        </div>
    </div>
    {% endfor %}

    <p><i>Les graphiques sont actualisés à chaque chargement de page.</i></p>
</body>
</html>
